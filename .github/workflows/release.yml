name: Release to GHCR

# Continuous deployment for the Business Central Integration Suite.
# - Triggers on pushes to main, on semver tags (v*), and on manual dispatch.
# - Builds the API and Web Docker images via Buildx and pushes to ghcr.io.
# - Uses the built-in GITHUB_TOKEN with packages:write — no extra secrets required.
# - First publish creates packages as PRIVATE; flip to public via
#   GitHub → Profile → Packages → <package> → Package settings → Change visibility.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are we publishing manually?"
        required: false
        default: "manual release"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & push ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile
            build_args: ""
          - name: web
            context: ./apps/web
            dockerfile: ./apps/web/Dockerfile
            build_args: |
              VITE_API_BASE_URL=

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image base
        id: ns
        run: |
          REPO="${{ github.repository }}"
          echo "image_base=${REGISTRY}/${REPO,,}/${{ matrix.image.name }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ns.outputs.image_base }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=bcsuite-${{ matrix.image.name }}
            org.opencontainers.image.description=Business Central Integration Suite — ${{ matrix.image.name }}
            org.opencontainers.image.vendor=xu323
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          # Multi-arch (linux/arm64) is intentionally OFF by default to keep
          # default-branch builds < 3 minutes. To enable, change to:
          #   platforms: linux/amd64,linux/arm64
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.image.build_args }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          provenance: false

      - name: Image digest
        run: |
          echo "Pushed ${{ steps.ns.outputs.image_base }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"

  summary:
    name: Release summary
    needs: publish
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Compute base
        id: ns
        run: |
          REPO="${{ github.repository }}"
          echo "owner_lc=$(echo "${REPO,,}" | cut -d/ -f1)" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${REPO,,}" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        run: |
          {
            echo "## 📦 GHCR Release"
            echo ""
            echo "Trigger: \`${{ github.event_name }}\`  ·  Ref: \`${{ github.ref }}\`  ·  SHA: \`${{ github.sha }}\`"
            echo ""
            echo "### Images"
            echo ""
            echo "- \`ghcr.io/${{ steps.ns.outputs.repo_lc }}/api\`"
            echo "- \`ghcr.io/${{ steps.ns.outputs.repo_lc }}/web\`"
            echo ""
            echo "### Pull commands"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/${{ steps.ns.outputs.repo_lc }}/api:latest"
            echo "docker pull ghcr.io/${{ steps.ns.outputs.repo_lc }}/web:latest"
            echo '```'
            echo ""
            echo "Manage packages: https://github.com/${{ steps.ns.outputs.owner_lc }}?tab=packages"
          } >> "$GITHUB_STEP_SUMMARY"
