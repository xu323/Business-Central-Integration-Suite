name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  backend-ci:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app tests

      - name: Run pytest
        env:
          BC_MODE: mock
          DATABASE_URL: sqlite:///./test.db
        run: pytest -q --cov=app --cov-report=term-missing

  frontend-ci:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint || echo "lint warnings only"

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ""

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          tags: bcsuite-api:ci

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: false
          tags: bcsuite-web:ci
          build-args: |
            VITE_API_BASE_URL=

  docs-check:
    name: Docs presence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required docs
        run: |
          set -e
          for f in README.md 使用方法.md docs/architecture.md docs/research-notes.md docs/security-notes.md docs/api.md docs/project-guide.md .env.example docker-compose.yml docker-compose.ghcr.yml .github/workflows/release.yml; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::Required document missing: $f"
              exit 1
            fi
          done
          echo "All required docs present."

  al-validation:
    name: AL source validation (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Validate app.json
        run: |
          if [ ! -f extensions/bc-procurement/app.json ]; then
            echo "::error::app.json missing"; exit 1
          fi
          python - <<'PY'
          import json, sys
          with open("extensions/bc-procurement/app.json", encoding="utf-8") as f:
              data = json.load(f)
          required = ["id", "name", "publisher", "version", "idRanges"]
          for k in required:
              if k not in data:
                  print(f"::error::Missing required app.json key: {k}")
                  sys.exit(1)
          ranges = data["idRanges"]
          if not ranges or not all(50000 <= r["from"] <= 99999 for r in ranges):
              print("::error::idRanges must be inside Per-Tenant Extension range 50000-99999")
              sys.exit(1)
          print("app.json OK ->", data["name"], data["version"])
          PY

      - name: Lint AL files (regex check)
        run: |
          set -e
          missing=0
          for f in $(find extensions/bc-procurement -name '*.al'); do
            head -1 "$f" | grep -qiE 'enum|table|page|codeunit|//' || { echo "::warning file=$f::AL file should start with object declaration or comment"; missing=$((missing+1)); }
          done
          echo "Scanned AL files; warnings = $missing"
          echo "Note: full alc.exe compilation requires a Business Central environment."
